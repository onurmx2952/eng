<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Pratik</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #f5f3ff, #eef2ff);
  margin: 0;
  padding: 14px;
  color: #111827;
}
.container {
  width: 100%;
  max-width: 760px;
  margin: auto;
}
.title {
  text-align: center;
  font-size: clamp(26px, 7vw, 36px);
  font-weight: 800;
  margin-top: 10px;
}
.subtitle {
  text-align: center;
  color: #6b7280;
  margin: 8px 0 18px;
  font-size: clamp(15px, 4vw, 18px);
}
.card {
  background: white;
  padding: 16px;
  border-radius: 18px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.08);
  border: 1px solid #e5e7eb;
}
.top-bar {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
select, button, textarea {
  width: 100%;
  padding: 15px;
  font-size: 17px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
}
button {
  background: linear-gradient(90deg, #7c3aed, #6366f1);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: 700;
  min-height: 52px;
}
.question-box {
  margin-top: 18px;
  padding: 16px;
  border-radius: 16px;
  background: #fafafa;
  border: 1px solid #e5e7eb;
}
.label {
  font-weight: 800;
  color: #6d28d9;
  margin-bottom: 8px;
}
.question {
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 700;
  line-height: 1.35;
}
textarea {
  margin-top: 16px;
  resize: vertical;
  min-height: 120px;
  font-size: 18px;
  line-height: 1.45;
}
.result {
  margin-top: 20px;
}
.result-grid {
  display: grid;
  gap: 14px;
}
.result-box {
  padding: 16px;
  border-radius: 16px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
}
.result-title {
  font-weight: 800;
  margin-bottom: 8px;
  font-size: 17px;
}
.status-correct {
  color: #16a34a;
  font-weight: 900;
  font-size: 20px;
}
.status-wrong {
  color: #dc2626;
  font-weight: 900;
  font-size: 20px;
}
.correct-sentence {
  color: #047857;
  font-size: 19px;
  font-weight: 800;
  line-height: 1.4;
}
.explanation,
.summary {
  line-height: 1.65;
  font-size: 16.5px;
}
.summary {
  background: #eef2ff;
  border-left: 5px solid #6366f1;
}
@media (min-width: 700px) {
  body { padding: 30px; }
  .card { padding: 24px; }
  .top-bar {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="title">İngilizce Pratik</div>
  <div class="subtitle">Cümleyi çevir, hatanı öğren, ilerle 🚀</div>
  <div class="card">
    <div class="top-bar">
      <select id="level">
        <option>A1</option>
        <option selected>A2</option>
        <option>B1</option>
      </select>
      <button onclick="newQuestion()">Yeni Soru</button>
    </div>
    <div class="question-box">
      <div class="label">Soru</div>
      <div class="question" id="question">Başlamak için “Yeni Soru” butonuna bas.</div>
    </div>
    <textarea id="answer" placeholder="İngilizce cevabını yaz..."></textarea>
    <button onclick="checkAnswer()">Kontrol Et</button>
    <div id="result" class="result"></div>
  </div>
</div>
<script>
const API_KEY = "AIzaSyBtrBb00fJgFmgr9m8t6qORfJt8dgUEWoA";
const MODEL = "gemini-2.5-flash";
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`;
let currentQuestion = "";
async function ask(prompt){
  const res = await fetch(`${API_URL}?key=${API_KEY}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });
  const data = await res.json();
  if (data.error) {
    return JSON.stringify({
      durum: "Yanlış",
      dogru: "API hatası",
      aciklama: data.error.message,
      ozet: "API key veya model adını kontrol et."
    });
  }
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}
async function newQuestion(){
  const level = document.getElementById("level").value;
  document.getElementById("result").innerHTML = "";
  document.getElementById("answer").value = "";
  document.getElementById("question").innerText = "Üretiliyor...";
  const prompt = `
${level} seviyesinde günlük hayattan TEK Türkçe cümle üret.
Sadece cümleyi yaz.
Açıklama yapma.
`;
  currentQuestion = await ask(prompt);
  document.getElementById("question").innerText = currentQuestion;
}
async function checkAnswer(){
  const answer = document.getElementById("answer").value.trim();
  if (!currentQuestion) {
    alert("Önce yeni soru oluştur.");
    return;
  }
  if (!answer) {
    alert("Cevap yaz.");
    return;
  }
  document.getElementById("result").innerHTML = "";
  const prompt = `
Türkçe cümle: "${currentQuestion}"
Kullanıcının İngilizce çevirisi: "${answer}"
Cevabı kontrol et.
SADECE geçerli JSON döndür.
Markdown kullanma.
Kod bloğu kullanma.
Format şu olsun:
{
  "durum": "Doğru / Kısmen doğru / Yanlış",
  "dogru": "Doğru İngilizce cümle",
  "aciklama": "Kısa açıklama",
  "ozet": "Konu özeti. Neden böyle olduğunu açıkla. Kullanıcının hatasına göre mantığı anlat. 1 doğru ve 1 yanlış örnek ver."
}
`;
  let raw = await ask(prompt);
  raw = raw.replace(/```json/g, "").replace(/```/g, "").trim();
  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    document.getElementById("result").innerHTML = `
      <div class="result-box">
        <div class="result-title">Cevap</div>
        <div class="explanation">${raw}</div>
      </div>
    `;
    return;
  }
  const statusClass =
    data.durum.includes("Doğru") && !data.durum.includes("Kısmen")
      ? "status-correct"
      : "status-wrong";
  document.getElementById("result").innerHTML = `
    <div class="result-grid">
      <div class="result-box">
        <div class="result-title">Durum</div>
        <div class="${statusClass}">${data.durum}</div>
      </div>
      <div class="result-box">
        <div class="result-title">Doğru Cümle</div>
        <div class="correct-sentence">${data.dogru}</div>
      </div>
      <div class="result-box">
        <div class="result-title">Kısa Açıklama</div>
        <div class="explanation">${data.aciklama}</div>
      </div>
      <div class="result-box summary">
        <div class="result-title">Konu Özeti</div>
        <div>${data.ozet}</div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
