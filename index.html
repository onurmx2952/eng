<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Pratik</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #f5f3ff, #eef2ff);
  margin: 0;
  padding: 14px;
  color: #111827;
}

.container {
  width: 100%;
  max-width: 760px;
  margin: auto;
}

.title {
  text-align: center;
  font-size: clamp(28px, 8vw, 42px);
  font-weight: 900;
  margin-top: 18px;
}

.subtitle {
  text-align: center;
  color: #6b7280;
  margin: 8px 0 22px;
  font-size: clamp(16px, 4vw, 20px);
}

.card {
  background: white;
  padding: 18px;
  border-radius: 22px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.08);
  border: 1px solid #e5e7eb;
}

.top-bar {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

select, button, textarea {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 16px;
  border: 1px solid #d1d5db;
}

button {
  background: linear-gradient(90deg, #7c3aed, #6366f1);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: 800;
  min-height: 56px;
}

.question-box {
  margin-top: 20px;
  padding: 18px;
  border-radius: 18px;
  background: #fafafa;
  border: 1px solid #e5e7eb;
}

.label {
  font-weight: 900;
  color: #6d28d9;
  margin-bottom: 10px;
  font-size: 20px;
}

.question {
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 850;
  line-height: 1.35;
  word-break: break-word;
}

textarea {
  margin-top: 18px;
  resize: vertical;
  min-height: 125px;
  font-size: 19px;
  line-height: 1.45;
}

.result {
  margin-top: 20px;
}

.result-grid {
  display: grid;
  gap: 14px;
}

.result-box {
  padding: 16px;
  border-radius: 16px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
}

.result-title {
  font-weight: 900;
  margin-bottom: 8px;
  font-size: 18px;
}

.status-correct {
  color: #16a34a;
  font-weight: 900;
  font-size: 21px;
}

.status-wrong {
  color: #dc2626;
  font-weight: 900;
  font-size: 21px;
}

.status-partial {
  color: #d97706;
  font-weight: 900;
  font-size: 21px;
}

.correct-sentence {
  color: #047857;
  font-size: 20px;
  font-weight: 850;
  line-height: 1.4;
}

.explanation,
.summary {
  line-height: 1.65;
  font-size: 17px;
  white-space: pre-wrap;
}

.summary {
  background: #eef2ff;
  border-left: 5px solid #6366f1;
}

.loading {
  color: #6d28d9;
  font-weight: 900;
}

@media (min-width: 700px) {
  body { padding: 30px; }
  .card { padding: 24px; }
  .top-bar { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">İngilizce Pratik</div>
  <div class="subtitle">Cümleyi çevir, hatanı öğren, ilerle 🚀</div>

  <div class="card">

    <div class="top-bar">
      <select id="level">
        <option>A1</option>
        <option selected>A2</option>
        <option>B1</option>
      </select>

      <button onclick="newQuestion()">Yeni Soru</button>
    </div>

    <div class="question-box">
      <div class="label">Soru</div>
      <div class="question" id="question">Başlamak için “Yeni Soru” butonuna bas.</div>
    </div>

    <textarea id="answer" placeholder="İngilizce cevabını yaz..."></textarea>

    <button onclick="checkAnswer()">Kontrol Et</button>

    <div id="result" class="result"></div>

  </div>

</div>

<script>
const WORKER_URL = "https://muddy-butterfly-d30e.onurmx2.workers.dev";

let currentQuestion = "";

function escapeHTML(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function ask(type, payload){
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 20000);

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ type, ...payload }),
      signal: controller.signal
    });

    const text = await res.text();

    if (!res.ok) {
      throw new Error("HTTP " + res.status + " - " + text);
    }

    try {
      return JSON.parse(text);
    } catch {
      throw new Error("JSON okunamadı: " + text);
    }

  } finally {
    clearTimeout(timeout);
  }
}

async function newQuestion(){
  const level = document.getElementById("level").value;

  document.getElementById("result").innerHTML = "";
  document.getElementById("answer").value = "";
  document.getElementById("question").innerHTML = '<span class="loading">Üretiliyor...</span>';

  try {
    const data = await ask("question", { level });

    if (data.error) {
      document.getElementById("question").innerText = "Hata: " + data.error;
      return;
    }

    currentQuestion = data.question;
    document.getElementById("question").innerText = currentQuestion || "Boş cevap geldi.";

  } catch (err) {
    document.getElementById("question").innerText =
      "Bağlantı hatası: " + err.message;
  }
}

async function checkAnswer(){
  const answer = document.getElementById("answer").value.trim();

  if (!currentQuestion) {
    alert("Önce yeni soru oluştur.");
    return;
  }

  if (!answer) {
    alert("Cevap yaz.");
    return;
  }

  document.getElementById("result").innerHTML = `
    <div class="result-box">
      <div class="result-title">Kontrol</div>
      <div class="loading">Kontrol ediliyor...</div>
    </div>
  `;

  try {
    const data = await ask("check", {
      question: currentQuestion,
      answer
    });

    if (data.error) {
      document.getElementById("result").innerHTML = `
        <div class="result-box">
          <div class="result-title">Hata</div>
          <div class="explanation">${escapeHTML(data.error)}</div>
        </div>
      `;
      return;
    }

    let statusClass = "status-wrong";

    if ((data.durum || "").includes("Kısmen")) {
      statusClass = "status-partial";
    } else if ((data.durum || "").includes("Doğru")) {
      statusClass = "status-correct";
    }

    document.getElementById("result").innerHTML = `
      <div class="result-grid">

        <div class="result-box">
          <div class="result-title">Durum</div>
          <div class="${statusClass}">${escapeHTML(data.durum)}</div>
        </div>

        <div class="result-box">
          <div class="result-title">Doğru Cümle</div>
          <div class="correct-sentence">${escapeHTML(data.dogru)}</div>
        </div>

        <div class="result-box">
          <div class="result-title">Kısa Açıklama</div>
          <div class="explanation">${escapeHTML(data.aciklama)}</div>
        </div>

        <div class="result-box summary">
          <div class="result-title">Konu Özeti</div>
          <div class="summary-text">${escapeHTML(data.ozet)}</div>
        </div>

      </div>
    `;

  } catch (err) {
    document.getElementById("result").innerHTML = `
      <div class="result-box">
        <div class="result-title">Bağlantı Hatası</div>
        <div class="explanation">${escapeHTML(err.message)}</div>
      </div>
    `;
  }
}
</script>

</body>
</html>
